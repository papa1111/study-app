<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 아이 공부 현황 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB2TsyqMli2wmdcNLILmaVmcOT1aAG-W8g",
    authDomain: "project-benkyo.firebaseapp.com",
    databaseURL: "https://project-benkyo-default-rtdb.firebaseio.com",
    projectId: "project-benkyo",
    storageBucket: "project-benkyo.firebasestorage.app",
    messagingSenderId: "640262755618",
    appId: "1:640262755618:web:003bdc8b595486a103817b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const dataRef = ref(db, 'studyData');

  window.googleLogin = async function() {
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
    } catch(e) { console.warn('로그인 실패:', e); }
  };
  window.googleLogout = async function() { await signOut(auth); };

  // 허용된 이메일 (엄마만)
  const ALLOWED_EMAIL = 'kas2255@gmail.com';

  let unsubscribe = null;

  onAuthStateChanged(auth, (user) => {
    const lockScreen = document.getElementById('lockScreen');
    const appContent = document.getElementById('appContent');
    const userInfo = document.getElementById('userInfo');
    const lockError = document.getElementById('lockError');
    if (user) {
      if (user.email === ALLOWED_EMAIL) {
        // 허용된 계정 → 앱 표시
        if (lockScreen) lockScreen.style.display = 'none';
        if (appContent) appContent.style.display = 'block';
        if (userInfo) userInfo.textContent = user.email;
        // 데이터 구독 시작
        if (!unsubscribe) {
          unsubscribe = onValue(dataRef, (snapshot) => {
            const d = snapshot.val();
            if (!d) return;
            lastData = d;
            if (d.isStudying) {
              liveBaseSec = d.totalSec;
              liveStartTs = Date.now();
              if (!liveInterval) {
                liveInterval = setInterval(() => {
                  if (!lastData?.isStudying) { clearInterval(liveInterval); liveInterval = null; return; }
                  const elapsed = Math.floor((Date.now() - liveStartTs) / 1000);
                  renderAll({ ...lastData, totalSec: liveBaseSec + elapsed });
                }, 1000);
              }
            } else {
              clearInterval(liveInterval); liveInterval = null;
            }
            renderAll(d);
          });
        }
      } else {
        // 허용되지 않은 계정 → 로그아웃
        signOut(auth);
        if (lockError) lockError.textContent = '접근 권한이 없는 계정이에요 🙅';
      }
    } else {
      if (lockScreen) lockScreen.style.display = 'flex';
      if (appContent) appContent.style.display = 'none';
      if (lockError) lockError.textContent = '';
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    }
  });

  const COLORS = ['#c97d4e','#6b8f71','#5b7fa6','#9b6bb5','#c0574a','#b07d30','#4a8fa0','#a06b7a'];

  function fmt(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  function fmtShort(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
    return h > 0 ? `${h}시간 ${m}분` : `${m}분`;
  }
  function pad(n) { return String(n).padStart(2, '0'); }

  let liveInterval = null;
  let lastData = null;
  let liveStartTs = null;
  let liveBaseSec = 0;

  function renderAll(d) {
    // 상태 뱃지
    const badge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    if (d.isStudying) {
      badge.className = 'status-badge studying';
      statusText.textContent = d.currentSubject ? `📖 ${d.currentSubject} 공부 중` : '📖 공부 중';
    } else {
      badge.className = 'status-badge resting';
      statusText.textContent = '😴 쉬는 중';
    }

    // 총 공부 시간
    document.getElementById('totalTime').textContent = fmt(d.totalSec || 0);

    // 목표 달성률
    const goalSec = d.goalSec || 0;
    const totalSec = d.totalSec || 0;
    const pct = goalSec > 0 ? Math.min(Math.round(totalSec / goalSec * 100), 100) : 0;
    document.getElementById('goalPct').textContent = goalSec > 0 ? `목표 ${Math.round(goalSec/3600)}h · ${pct}% 달성` : '목표 미설정';
    document.getElementById('goalBar').style.width = pct + '%';

    // 세션 / 할일
    document.getElementById('sessionCount').textContent = d.sessionCount || 0;
    document.getElementById('taskCount').textContent = `${d.tasksDone || 0} / ${d.tasksTotal || 0}`;

    // 마지막 업데이트
    if (d.lastUpdated) {
      const ago = Math.floor((Date.now() - d.lastUpdated) / 1000);
      document.getElementById('lastUpdated').textContent =
        ago < 60 ? `방금 전` : `${Math.floor(ago/60)}분 전`;
    }

    // 과목별 차트
    const bySubject = d.bySubject || {};
    const entries = Object.entries(bySubject)
      .map(([id, v]) => ({ ...v, id }))
      .filter(v => v.sec > 0)
      .sort((a, b) => b.sec - a.sec);

    const chartWrap = document.getElementById('subjectChart');
    if (entries.length === 0) {
      chartWrap.innerHTML = '<div class="chart-empty">아직 공부 기록이 없어요</div>';
    } else {
      const maxSec = entries[0].sec;
      chartWrap.innerHTML = entries.map(e => {
        const barColor = COLORS[e.colorIdx % COLORS.length];
        return `
          <div class="chart-row">
            <div class="chart-label">${e.name}</div>
            <div class="chart-bar-bg">
              <div class="chart-bar-fill" style="width:${(e.sec/maxSec*100).toFixed(1)}%;background:${barColor}"></div>
            </div>
            <div class="chart-val">${fmtShort(e.sec)}</div>
          </div>`;
      }).join('');
    }

    // 고양이 이모지 상태
    const hours = totalSec / 3600;
    const catEl = document.getElementById('catEmoji');
    if (d.isStudying) catEl.textContent = '🐱';
    else if (hours >= 4) catEl.textContent = '😸';
    else if (hours >= 2) catEl.textContent = '😺';
    else catEl.textContent = '🙀';

    // 응원 메시지
    const msg = document.getElementById('cheerMsg');
    if (d.isStudying) msg.textContent = '지금 열심히 공부하고 있어요! 💪';
    else if (hours >= 6) msg.textContent = '오늘 정말 대단한데요! 🌟';
    else if (hours >= 4) msg.textContent = '오늘도 잘 하고 있어요! 👏';
    else if (hours >= 2) msg.textContent = '꾸준히 하고 있네요 😊';
    else if (hours > 0) msg.textContent = '공부 시작했어요!';
    else msg.textContent = '아직 공부를 시작하지 않았어요';
  }
</script>

<style>
:root {
  --bg: #fdf8f4;
  --surface: #ffffff;
  --surface2: #f5f0eb;
  --border: #e8e0d8;
  --text: #2a2520;
  --text-muted: #9a9088;
  --accent: #c97d4e;
  --green: #5a8f62;
  --shadow: 0 2px 16px rgba(42,37,32,0.08);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Gowun Dodum', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 60px;
}

/* 헤더 */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.header-title {
  font-family: 'Nanum Gothic Coding', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}
.header-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* 상태 뱃지 */
.status-section {
  display: flex;
  justify-content: center;
  padding: 28px 20px 0;
}
.status-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  border-radius: 99px;
  font-size: 1rem;
  font-weight: 700;
  transition: all 0.4s;
}
.status-badge.studying {
  background: #e8f5ea;
  color: var(--green);
  border: 2px solid #b4ddb8;
  animation: pulse 2s ease-in-out infinite;
}
.status-badge.resting {
  background: var(--surface2);
  color: var(--text-muted);
  border: 2px solid var(--border);
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(90,143,98,0.3); }
  50% { box-shadow: 0 0 0 10px rgba(90,143,98,0); }
}

/* 카드 그리드 */
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  max-width: 600px;
  margin: 20px auto 0;
  padding: 0 16px;
}
@media (max-width: 480px) { .cards { grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px; } }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 16px;
  text-align: center;
}
.card-icon { font-size: 1.6rem; margin-bottom: 6px; }
.card-val {
  font-family: 'Nanum Gothic Coding', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.card-lbl { font-size: 0.72rem; color: var(--text-muted); }

/* 총 공부 시간 카드 (넓게) */
.card-wide {
  grid-column: 1 / -1;
  padding: 22px 20px;
}
.card-wide .card-val {
  font-size: 2.8rem;
  letter-spacing: 3px;
  color: var(--accent);
}
.goal-bar-wrap {
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  margin: 10px 0 6px;
}
.goal-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 1s ease;
}
.goal-pct { font-size: 0.74rem; color: var(--text-muted); }

/* 고양이 + 응원 */
.cheer-section {
  max-width: 600px;
  margin: 14px auto 0;
  padding: 0 16px;
}
.cheer-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.cat-big { font-size: 3rem; line-height: 1; }
.cheer-text { flex: 1; }
.cheer-msg { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
.cheer-sub { font-size: 0.76rem; color: var(--text-muted); }

/* 과목별 차트 */
.chart-section {
  max-width: 600px;
  margin: 14px auto 0;
  padding: 0 16px;
}
.section-title {
  font-size: 0.71rem;
  font-weight: 700;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 11px;
}
.chart-row { display: flex; align-items: center; gap: 10px; }
.chart-label { width: 44px; font-size: 0.82rem; text-align: right; flex-shrink: 0; }
.chart-bar-bg { flex: 1; height: 26px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 6px; transition: width 0.8s cubic-bezier(.34,1.2,.64,1); min-width: 4px; }
.chart-val { font-family: 'Nanum Gothic Coding', monospace; font-size: 0.75rem; width: 60px; text-align: right; flex-shrink: 0; color: var(--text-muted); }
.chart-empty { color: var(--text-muted); font-size: 0.88rem; text-align: center; padding: 16px 0; }

/* 마지막 업데이트 */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 0.74rem;
  color: var(--text-muted);
}

/* ══ 비밀번호 화면 ══ */
.lock-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.lock-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 36px 32px; text-align: center; width: 300px;
}
.lock-icon { font-size: 2.4rem; margin-bottom: 10px; }
.lock-title { font-family: 'Nanum Gothic Coding', monospace; font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
.lock-sub { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 20px; }
.lock-input {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: 9px; font-family: 'Gowun Dodum', sans-serif;
  font-size: 1rem; outline: none; background: var(--surface2);
  text-align: center; letter-spacing: 3px; margin-bottom: 10px;
  transition: border-color 0.2s;
}
.lock-input:focus { border-color: var(--accent); }
.lock-btn {
  width: 100%; padding: 11px; border: none; border-radius: 9px;
  background: var(--accent); color: #fff; font-family: 'Gowun Dodum', sans-serif;
  font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.lock-btn:hover { background: #b86c3c; }
.lock-error { font-size: 0.78rem; color: var(--danger); margin-top: 8px; min-height: 1.2em; }
.live-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 5px;
  vertical-align: middle;
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>

<!-- ══ 구글 로그인 화면 ══ -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🐾</div>
    <div class="lock-title">공부 현황판</div>
    <div class="lock-sub">구글 계정으로 로그인하세요</div>
    <button class="lock-btn" style="display:flex;align-items:center;justify-content:center;gap:10px;" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/><path fill="#fff" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#fff" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/><path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.95 13.04C2.44 15.98 5.48 18 9 18z"/></svg>
      Google로 로그인
    </button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<div id="appContent" style="display:none">
<div class="header">
  <div class="header-title">🐾 우리 아이 공부 현황</div>
  <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-top:4px;">
    <span id="userInfo" style="font-size:0.72rem;color:var(--text-muted);"></span>
    <button onclick="googleLogout()" style="font-size:0.72rem;background:none;border:1px solid var(--border);border-radius:99px;padding:2px 10px;cursor:pointer;color:var(--text-muted);">로그아웃</button>
  </div>
</div>

<div class="status-section">
  <div class="status-badge resting" id="statusBadge">
    <span id="statusText">불러오는 중...</span>
  </div>
</div>

<div class="cards">
  <!-- 총 공부 시간 -->
  <div class="card card-wide">
    <div class="card-lbl" style="margin-bottom:6px">오늘 총 공부 시간</div>
    <div class="card-val" id="totalTime">00:00:00</div>
    <div class="goal-bar-wrap"><div class="goal-bar-fill" id="goalBar" style="width:0%"></div></div>
    <div class="goal-pct" id="goalPct">목표 미설정</div>
  </div>

  <!-- 세션 수 -->
  <div class="card">
    <div class="card-icon">⏱</div>
    <div class="card-val" id="sessionCount">0</div>
    <div class="card-lbl">공부 세션</div>
  </div>

  <!-- 할 일 -->
  <div class="card">
    <div class="card-icon">✅</div>
    <div class="card-val" id="taskCount">0 / 0</div>
    <div class="card-lbl">할 일 완료</div>
  </div>
</div>

<!-- 고양이 + 응원 -->
<div class="cheer-section">
  <div class="cheer-card">
    <div class="cat-big" id="catEmoji">🐱</div>
    <div class="cheer-text">
      <div class="cheer-msg" id="cheerMsg">불러오는 중...</div>
      <div class="cheer-sub">오늘도 응원해요 💕</div>
    </div>
  </div>
</div>

<!-- 과목별 차트 -->
<div class="chart-section">
  <div class="section-title">과목별 공부 시간</div>
  <div class="chart-card" id="subjectChart">
    <div class="chart-empty">불러오는 중...</div>
  </div>
</div>

<div class="footer">
  <span class="live-dot"></span>실시간 연결 중 · 마지막 업데이트: <span id="lastUpdated">-</span>
</div>
</div><!-- appContent end -->

</body>
</html>
